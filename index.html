<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceHub Pro | Desktop Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6; 
            --success: #4ade80; 
            --danger: #f87171; 
            --bg: #0f172a; 
            --card: #1e293b; 
            --text-main: #f8fafc; 
            --text-sub: #94a3b8; 
            --border: #334155; 
            --donate: #009ee3;
        }

        /* Scrollbar Customizada para PC */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        header {
            margin-bottom: 50px;
            text-align: center;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background-color: var(--primary);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            color: white;
            font-weight: bold;
            font-size: 1.4rem;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        /* Dashboard Otimizado */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }

        .card h3 { font-size: 0.85rem; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1.5px; }
        .card p { font-size: 2rem; font-weight: 600; margin-top: 10px; }
        .card.total { background: linear-gradient(135deg, var(--primary), #1d4ed8); border: none; }

        /* Conteúdo em colunas para Desktop */
        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 850px) {
            .main-content { grid-template-columns: 1fr; }
            .dashboard { grid-template-columns: 1fr; }
        }

        .form-group {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            position: sticky;
            top: 20px; /* Mantém o formulário visível ao rolar a lista no PC */
        }

        .section-title { margin-bottom: 20px; font-size: 1.5rem; font-weight: 600; display: flex; justify-content: space-between; align-items: center;}

        label { color: var(--text-sub); font-size: 0.9rem; margin-top: 15px; display: block; }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            background-color: #0f172a;
            color: var(--text-main);
            transition: border-color 0.3s;
        }

        input:focus { outline: none; border-color: var(--primary); }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover { background: #2563eb; transform: scale(1.02); }

        .btn-clear {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            font-size: 0.8rem;
            padding: 8px 15px;
            width: auto;
            margin: 0;
        }

        .btn-clear:hover { background: var(--danger); color: white; transform: scale(1); }

        /* Histórico */
        .transaction-list { 
            list-style: none; 
            max-height: 600px; 
            overflow-y: auto; 
            padding-right: 10px;
        }

        .transaction-item {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            border-left: 6px solid #334155;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .item-plus { border-left-color: var(--success); }
        .item-minus { border-left-color: var(--danger); }

        .delete-btn {
            background: transparent;
            color: var(--text-sub);
            width: auto;
            margin: 0;
            padding: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .delete-btn:hover { color: var(--danger); }

        footer {
            margin-top: 60px;
            padding: 40px;
            text-align: center;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 20px;
        }

        .btn-donate {
            display: inline-block;
            background-color: var(--donate);
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .btn-donate:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 158, 227, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-container">
            <div class="logo-icon">$</div>
            <h1 style="font-size: 2.5rem;">FinanceHub <span style="color: var(--primary)">Pro</span></h1>
        </div>
        <p style="color: var(--text-sub); font-size: 1.1rem;">Sua dashboard financeira otimizada para navegador</p>
    </header>

    <div class="dashboard">
        <div class="card">
            <h3>Total Entradas</h3>
            <p id="money-plus" style="color: var(--success)">R$ 0.00</p>
        </div>
        <div class="card">
            <h3>Total Saídas</h3>
            <p id="money-minus" style="color: var(--danger)">R$ 0.00</p>
        </div>
        <div class="card total">
            <h3>Saldo Disponível</h3>
            <p id="balance">R$ 0.00</p>
        </div>
    </div>

    <div class="main-content">
        <div class="form-container">
            <div class="form-group">
                <h2 style="margin-bottom: 20px;">Novo Registro</h2>
                <form id="form">
                    <label>NOME DA TRANSAÇÃO</label>
                    <input type="text" id="text" placeholder="Ex: Salário Mensal" required autocomplete="off">
                    
                    <label>VALOR (R$)</label>
                    <input type="number" id="amount" step="0.01" placeholder="- 150,00" required>
                    
                    <button type="submit">Adicionar à Lista</button>
                </form>
            </div>
        </div>

        <div>
            <div class="section-title">
                <h2>Histórico de Fluxo</h2>
                <button class="btn-clear" onclick="clearAllData()">Limpar Banco de Dados</button>
            </div>
            <ul id="transactions" class="transaction-list">
                </ul>
        </div>
    </div>
</div>

<footer>
    <p style="color: var(--text-sub); font-size: 1rem;">O FinanceHub Pro é uma ferramenta local e privada.</p>
    <a href="https://mpago.la/217gKFS" target="_blank" class="btn-donate">
        ☕ Apoiar o Projeto (Doação Mercado Pago)
    </a>
</footer>

<script>
    const balance = document.getElementById('balance');
    const moneyPlus = document.getElementById('money-plus');
    const moneyMinus = document.getElementById('money-minus');
    const list = document.getElementById('transactions');
    const form = document.getElementById('form');
    const text = document.getElementById('text');
    const amount = document.getElementById('amount');

    const localStorageTransactions = JSON.parse(localStorage.getItem('transactions'));
    let transactions = localStorage.getItem('transactions') !== null ? localStorageTransactions : [];

    function addTransaction(e) {
        e.preventDefault();
        if (text.value.trim() === '' || amount.value.trim() === '') return;

        const transaction = {
            id: Math.floor(Math.random() * 100000000),
            text: text.value,
            amount: +amount.value
        };

        transactions.push(transaction);
        init();
        updateLocalStorage();
        text.value = '';
        amount.value = '';
    }

    function removeTransaction(id) {
        transactions = transactions.filter(t => t.id !== id);
        updateLocalStorage();
        init();
    }

    function clearAllData() {
        if(confirm("Deseja realmente apagar todos os registros permanentemente?")) {
            if(confirm("Último aviso: Esta ação não pode ser desfeita. Confirmar?")) {
                transactions = [];
                updateLocalStorage();
                init();
            }
        }
    }

    function addTransactionDOM(transaction) {
        const sign = transaction.amount < 0 ? '-' : '+';
        const item = document.createElement('li');
        const cssClass = transaction.amount < 0 ? 'item-minus' : 'item-plus';

        item.classList.add('transaction-item', cssClass);
        item.innerHTML = `
            <div>
                <strong style="font-size: 1.1rem">${transaction.text}</strong><br>
                <span style="color: ${transaction.amount < 0 ? 'var(--danger)' : 'var(--success)'}; font-weight: 600">
                    ${sign} R$ ${Math.abs(transaction.amount).toFixed(2)}
                </span>
            </div>
            <button class="delete-btn" onclick="removeTransaction(${transaction.id})" title="Excluir">✕</button>
        `;
        list.appendChild(item);
    }

    function updateValues() {
        const amounts = transactions.map(t => t.amount);
        const total = amounts.reduce((acc, item) => (acc += item), 0).toFixed(2);
        const income = amounts.filter(item => item > 0).reduce((acc, item) => (acc += item), 0).toFixed(2);
        const expense = (amounts.filter(item => item < 0).reduce((acc, item) => (acc += item), 0) * -1).toFixed(2);

        balance.innerText = `R$ ${total}`;
        moneyPlus.innerText = `R$ ${income}`;
        moneyMinus.innerText = `R$ ${expense}`;
    }

    function updateLocalStorage() {
        localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    function init() {
        list.innerHTML = '';
        transactions.forEach(addTransactionDOM);
        updateValues();
    }

    form.addEventListener('submit', addTransaction);
    init();
</script>

</body>
</html>
